services:
  # Backend Service
  - type: web
    name: biosphere-backend
    env: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    postDeployCommand: alembic upgrade head && python create_admin.py && python fix_all_seed_errors.py && python seed_specialists.py
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: biosphere-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.13.4

  # Frontend Service
  - type: static
    name: biosphere-frontend
    region: frankfurt
    plan: free
    rootDir: biosphere-vet-clinic
    buildCommand: npm install && npm run build
    publishDir: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_URL
        fromService:
          name: biosphere-backend
          type: web
          property: host
        format: https://{{host}}
      - key: NODE_VERSION
        value: 20.x

databases:
  - name: biosphere-db
    region: frankfurt
    plan: free
    databaseName: biosphere
    user: biosphere_user

