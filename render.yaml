services:
  # Backend Service
  - type: web
    name: biosphere-backend
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: bash backend/start.sh
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: biosphere-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.13.4

  # Frontend Service
  - type: web
    name: biosphere-frontend
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    autoDeploy: true
    rootDir: biosphere-vet-clinic
    envVars:
      - key: VITE_API_URL
        fromService:
          name: biosphere-backend
          type: web
          property: host
        format: https://{{host}}
      - key: PORT
        value: 10000
      - key: NODE_VERSION
        value: 20.x

  # PostgreSQL Database
  - type: pspg
    name: biosphere-db
    region: frankfurt
    plan: free
    databaseName: biosphere
    user: biosphere_user

